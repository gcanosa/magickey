<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Key | Musical Scale Discoverer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="description" content="Discover musical scales in real-time by selecting notes. A professional tool for musicians and composers.">
    <script>
      (function () {
        try {
          var k = 'magickey-theme';
          var t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app" data-mode="discover">
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        title="Cambiar a tema claro"
        aria-label="Cambiar a tema claro"
        aria-pressed="false"
      >
        <span class="theme-icon theme-icon-sun" aria-hidden="true"
          ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            ><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" /></svg
        ></span>
        <span class="theme-icon theme-icon-moon" aria-hidden="true"
          ><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            ><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg
        ></span>
      </button>
      <header>
        <h1>Magic Key</h1>
        <p class="header-tagline">Selecciona notas para descubrir escalas o ver la tonalidad mayor</p>
        <div class="mode-switch" role="tablist" aria-label="Modo de trabajo">
          <button type="button" id="mode-discover" class="mode-btn active" role="tab" aria-selected="true">
            Descubrir escalas
          </button>
          <button type="button" id="mode-tonality" class="mode-btn" role="tab" aria-selected="false">
            Notas en tonalidad mayor
          </button>
        </div>
      </header>

      <main>
        <section class="selector-container">
          <div class="audio-tools">
            <button
              type="button"
              id="note-preview-toggle"
              class="audio-tool-btn"
              aria-pressed="false"
              title="Activar sonido al tocar notas"
              aria-label="Activar sonido al tocar notas"
            >
              <span class="audio-icon audio-icon-on" aria-hidden="true"
                ><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  ><path d="M11 5L6 9H2v6h4l5 4V5z" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg
              ></span>
              <span class="audio-icon audio-icon-off" aria-hidden="true"
                ><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  ><path d="M11 5L6 9H2v6h4l5 4V5z" /><line x1="22" y1="9" x2="16" y2="15" /><line x1="16" y1="9" x2="22" y2="15" /></svg
              ></span>
            </button>
          </div>
          <div class="note-row" id="naturals-row">
            <!-- JS will populate these -->
          </div>
          <div class="note-row" id="sharps-row">
            <!-- JS will populate these -->
          </div>
          <div class="note-row" id="flats-row">
            <!-- JS will populate these -->
          </div>
        </section>

        <section class="results-container">
          <div id="key-detector" class="key-detector discover-only hidden">
            <span>Clave Probable:</span>
            <div id="best-key" class="best-key best-key-large">--</div>
          </div>

          <div class="results-header discover-only">
            <h2>Escalas Encontradas</h2>
            <span id="match-count">0 coincidencias</span>
          </div>
          <div id="scales-grid" class="scales-grid discover-only">
            <div class="empty-state">Comienza a marcar notas para ver resultados</div>
          </div>
          <div id="tonality-panel" class="tonality-panel hidden" aria-live="polite"></div>
        </section>
      </main>

      <footer class="app-footer">
        <div class="footer-actions">
          <button type="button" id="reset-btn">Resetear Notas</button>
        </div>
        <div class="copyright" role="contentinfo">
          <p class="copyright-line">
            <span class="copyright-year-inline">© 2026</span>
            <span class="copyright-sep" aria-hidden="true">·</span>
            <span class="copyright-name">Gerardo Canosa</span>
            <span class="copyright-sep" aria-hidden="true">·</span>
            <span class="copyright-rights-inline">All rights reserved</span>
            <span class="copyright-sep" aria-hidden="true">·</span>
            <a class="copyright-email" href="mailto:gera.canosa@gmail.com">gera.canosa@gmail.com</a>
          </p>
        </div>
      </footer>
    </div>

    <dialog
      id="staff-sheet-dialog"
      class="staff-sheet-dialog"
      aria-labelledby="staff-sheet-dialog-title"
    >
      <div class="staff-sheet-dialog-panel">
        <div class="staff-sheet-dialog-head">
          <h2 id="staff-sheet-dialog-title" class="staff-sheet-dialog-title"></h2>
          <button
            type="button"
            id="staff-sheet-dialog-close"
            class="staff-sheet-dialog-close"
            aria-label="Cerrar partitura"
          >
            Cerrar
          </button>
        </div>
        <div id="staff-sheet-svg-mount" class="staff-sheet-svg-mount"></div>
      </div>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
